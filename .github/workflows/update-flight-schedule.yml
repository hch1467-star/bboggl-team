name: Update flight schedule

on:
  schedule:
    - cron: "0 0 1 * *" # 매달 1일 00:00 UTC(오전 9시 KST)
  workflow_dispatch: {} # 저장소 Actions 탭에서 수동으로도 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest schedule and regenerate js/flightSchedule.js
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
        run: node scripts/update-flight-schedule.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- js/flightSchedule.js; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git add js/flightSchedule.js
            git commit -m "항공편 시간표 자동 갱신 ($(date +%Y-%m-%d))"
            git push
          fi
