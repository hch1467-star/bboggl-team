<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 · JM 비밀노트</title>
<link rel="manifest" href="manifest.json?v=52">
<link rel="icon" href="icons/favicon.png?v=52">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=52">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FOR BD">
<meta name="theme-color" content="#8134AF">
<link rel="stylesheet" href="css/design-system.css?v=52">
<link rel="stylesheet" href="css/layout.css?v=52">
<link rel="stylesheet" href="css/calendar.css?v=52">
<link rel="stylesheet" href="css/admin.css?v=52">
</head>
<body>

<header class="app-header">
  <div class="header-logo"><span class="grad-text">JM 비밀노트</span></div>

  <nav class="header-nav">
    <span class="nav-link active">관리자 · 전체 조회</span>
  </nav>

  <div class="header-right">
    <span class="current-user-email" id="current-user-email"></span>
    <button class="btn btn-outline btn-sm" id="logout-btn" type="button">로그아웃</button>
  </div>
</header>

<div class="loading-overlay" id="loading-overlay">확인하는 중...</div>

<main class="app-main">

  <section class="card employee-picker-card">
    <h3>직원 선택 <span class="employee-picker-hint">(중복 선택 가능 — 체크한 직원들의 일정이 아래에 함께 표시돼요)</span></h3>
    <div id="employee-checkbox-list" class="employee-checkbox-list"></div>
  </section>

  <div class="calendar-page">
    <section class="card calendar-card">
      <div class="calendar-toolbar">
        <h2 class="month-label" id="month-label">2026년 7월</h2>
        <div class="month-nav">
          <button id="prev-month-btn" aria-label="이전 달"></button>
          <button id="next-month-btn" aria-label="다음 달"></button>
        </div>
      </div>
      <div class="calendar-legend">
        <button class="legend-item legend-btn active" type="button" data-direction="">
          <span class="legend-dot legend-dot-all"></span>전체
        </button>
        <button class="legend-item legend-btn" type="button" data-direction="입국">
          <span class="legend-dot legend-dot-arrival"></span>입국편만
        </button>
        <button class="legend-item legend-btn" type="button" data-direction="출국">
          <span class="legend-dot legend-dot-departure"></span>출국편만
        </button>
        <button class="legend-item legend-btn" type="button" data-direction="이벤트">
          <span class="legend-dot legend-dot-event"></span>이벤트
        </button>
        <button class="btn btn-outline btn-sm add-event-btn" id="add-event-btn" type="button">+ 이벤트</button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>

    <aside class="card detail-panel">
      <h3 class="detail-panel-title" id="detail-panel-title">방문 일정</h3>
      <div id="detail-panel-body"></div>
    </aside>
  </div>
</main>

<div class="modal-overlay hidden" id="event-modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h3>이벤트 추가</h3>
      <button class="modal-close" id="event-modal-close-btn" aria-label="닫기"></button>
    </div>

    <label class="event-form-label" for="event-date-input">날짜</label>
    <input class="event-form-input" id="event-date-input" type="date">

    <label class="event-form-label" for="event-title-input">제목</label>
    <input class="event-form-input" id="event-title-input" type="text" placeholder="예) 나리타공항 불꽃축제">

    <label class="event-form-label" for="event-memo-input">메모 (선택)</label>
    <textarea class="modal-textarea event-memo-textarea" id="event-memo-input" placeholder="메모"></textarea>

    <div class="modal-actions">
      <button class="btn btn-outline" id="event-modal-cancel-btn" type="button">취소</button>
      <button class="btn btn-gradient" id="event-modal-save-btn" type="button">저장</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabaseClient.js?v=52"></script>
<script src="js/auth.js?v=52"></script>
<script src="js/icons.js?v=52"></script>
<script src="js/parseSchedule.js?v=52"></script>
<script src="js/flightDirections.js?v=52"></script>
<script src="js/directionClassify.js?v=52"></script>
<script src="js/japanHolidays.js?v=52"></script>
<script src="js/data.js?v=52"></script>
<script src="js/calendar.js?v=52"></script>
<script src="js/eventModal.js?v=52"></script>
<script src="js/admin.js?v=52"></script>
<script>
  document.getElementById("prev-month-btn").innerHTML = Icons.chevronLeft;
  document.getElementById("next-month-btn").innerHTML = Icons.chevronRight;
</script>
</body>
</html>
