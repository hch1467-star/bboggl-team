<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이페이지 · JM 비밀노트</title>
<link rel="manifest" href="manifest.json?v=36">
<link rel="icon" href="icons/favicon.png?v=36">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=36">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FOR BD">
<meta name="theme-color" content="#8134AF">
<link rel="stylesheet" href="css/design-system.css?v=36">
<link rel="stylesheet" href="css/layout.css?v=36">
<link rel="stylesheet" href="css/mypage.css?v=36">
</head>
<body>

<header class="app-header">
  <div class="header-logo"><span class="grad-text">JM 비밀노트</span></div>

  <nav class="header-nav">
    <a href="index.html" class="nav-link">캘린더</a>
    <a href="mypage.html" class="nav-link active">마이페이지</a>
    <a href="flights.html" class="nav-link">항공검색</a>
  </nav>

  <div class="header-right">
    <div class="header-search-wrap">
      <div class="header-search">
        <span id="search-icon"></span>
        <input type="text" placeholder="고객명 또는 편명 검색" disabled>
      </div>
    </div>
    <span class="current-user-email" id="current-user-email"></span>
    <button class="btn btn-outline btn-sm" id="logout-btn" type="button">로그아웃</button>
  </div>
</header>

<div class="loading-overlay" id="loading-overlay">일정을 불러오는 중...</div>

<main class="app-main mypage-main">

  <section class="card profile-card">
    <div class="profile-avatar">뽀</div>
    <div class="profile-info">
      <h2 id="profile-name">내 계정</h2>
      <p class="profile-sub" id="profile-email">-</p>
    </div>
  </section>

  <section class="card activity-card">
    <div class="mypage-tabs">
      <button type="button" class="mypage-tab active" id="tab-arrival-btn">입국편</button>
      <button type="button" class="mypage-tab" id="tab-departure-btn">출국편</button>
      <button type="button" class="mypage-tab" id="tab-arrival-wt-btn">
        입국대기 <span class="mypage-tab-count" id="tab-arrival-wt-count">0</span>
      </button>
      <button type="button" class="mypage-tab" id="tab-departure-wt-btn">
        출국대기 <span class="mypage-tab-count" id="tab-departure-wt-count">0</span>
      </button>
    </div>
    <div id="activity-list" class="activity-list"></div>
  </section>

</main>

<nav class="bottom-tabbar">
  <a href="index.html">캘린더</a>
  <a href="mypage.html" class="active">마이페이지</a>
  <a href="flights.html">항공검색</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabaseClient.js?v=36"></script>
<script src="js/auth.js?v=36"></script>
<script src="js/icons.js?v=36"></script>
<script src="js/parseSchedule.js?v=36"></script>
<script src="js/flightDirections.js?v=36"></script>
<script src="js/directionClassify.js?v=36"></script>
<script src="js/data.js?v=36"></script>
<script src="js/mypage.js?v=36"></script>
<script>
  document.getElementById("search-icon").innerHTML = Icons.search;
</script>
</body>
</html>
